services:
  postgres:
    image: postgres:16-alpine
    container_name: spacetimedb-ui-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shim
      POSTGRES_PASSWORD: shim
      POSTGRES_DB: postgres
    ports:
      - "45433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shim -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
